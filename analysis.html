<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분석 결과 - 오늘 급식, 밥값 했을까?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --tray-groove: #C9D0C4;
    --ink: #20261F;
    --ink-soft: #55604F;
    --ink-faint: #8B9484;
    --rice: #FBF8F1;
    --soup: #D8E6DE;
    --kimchi: #C1432B;
    --spinach: #3F6B4A;
    --egg: #D98F2B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--tray-groove);
    font-family: 'Pretendard', sans-serif;
    color: var(--ink);
    padding: 20px 14px 40px;
  }
  .page { max-width: 720px; margin: 0 auto; }

  .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .back {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--rice); color: var(--ink-soft);
    text-decoration: none; flex-shrink: 0;
  }
  .back svg { width: 18px; height: 18px; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--spinach); margin: 0;
  }

  .progress {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    background: var(--tray-groove); border-radius: 18px; padding: 8px; margin-bottom: 12px;
  }
  .progress .dot {
    border-radius: 12px; padding: 0.7rem 0.6rem; text-align: center;
    background: var(--rice); opacity: 0.5;
  }
  .progress .dot .idx {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
    display: block; margin-bottom: 4px;
  }
  .progress .dot span:last-child { font-size: 12px; font-weight: 600; }
  .progress .dot.active { opacity: 1; background: #EAF1E6; }
  .progress .dot.active .idx { color: var(--spinach); }

  .tray {
    display: grid; grid-template-columns: 1fr; gap: 10px;
    background: var(--tray-groove); border-radius: 24px; padding: 10px;
  }
  .compartment { background: var(--rice); border-radius: 18px; padding: 1.8rem 1.6rem; }

  /* 로딩 상태 */
  #loadingState { text-align: center; padding: 3rem 1.6rem; }
  .spinner {
    width: 40px; height: 40px; margin: 0 auto 18px;
    border-radius: 50%;
    border: 4px solid var(--soup);
    border-top-color: var(--spinach);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingState p { font-size: 14px; color: var(--ink-soft); margin: 0; }

  /* 에러 상태 */
  #errorState { display: none; text-align: center; padding: 2rem 1.6rem; color: var(--kimchi); font-size: 14px; }
  #errorState button {
    margin-top: 14px; background: var(--kimchi); color: var(--rice); border: none;
    padding: 10px 20px; border-radius: 999px; font-weight: 600; cursor: pointer;
  }

  /* 결과 상태 */
  #resultState { display: none; }
  .menu-recap { font-size: 13px; color: var(--ink-faint); margin: 0 0 4px; }
  .menu-recap strong { color: var(--ink-soft); }

  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; margin: 0 0 10px;
  }
  #nutrients .section-title { color: var(--kimchi); }
  #summary .section-title { color: var(--spinach); }
  .diet-title { color: var(--kimchi); }
  .muscle-title { color: var(--spinach); }

  .rating {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-top: 4px;
  }
  #starDisplay {
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--ink-faint);
  }
  #starDisplay .filled { color: var(--egg); }
  .rating-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
  }

  .nutrient-list { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 8px; }
  .nutrient-list li {
    background: #F7E7E1; color: var(--kimchi);
    font-size: 13px; font-weight: 600;
    padding: 8px 14px; border-radius: 999px;
  }

  #summary p { font-size: 15px; line-height: 1.75; margin: 0; white-space: pre-wrap; }

  .soup {
    background: var(--soup); border-radius: 18px;
    display: flex; align-items: center; gap: 14px; padding: 1.2rem 1.5rem;
  }
  .soup .rim {
    width: 34px; height: 34px; flex-shrink: 0; border-radius: 50%;
    border: 3px solid var(--spinach); opacity: 0.7;
  }
  .soup span { font-size: 13px; font-weight: 600; color: var(--spinach); line-height: 1.5; }

  .retry {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--spinach); color: var(--rice); border: none;
    font-family: 'Pretendard', sans-serif; font-size: 15px; font-weight: 600;
    padding: 15px 24px; border-radius: 999px; cursor: pointer; margin-top: 6px;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .retry:hover { background: #345A3D; transform: translateY(-2px); }
  .retry:focus-visible { outline: 3px solid var(--egg); outline-offset: 3px; }

  @media (min-width: 600px) {
    .compartment { padding: 2.2rem 2.4rem; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a class="back" href="index.html" aria-label="이전 페이지로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
    </a>
    <p class="eyebrow">급식 영양 분석 서비스</p>
  </div>

  <div class="progress">
    <div class="dot"><span class="idx">01</span><span>메뉴 적기</span></div>
    <div class="dot active"><span class="idx">02</span><span>AI 분석</span></div>
    <div class="dot"><span class="idx">03</span><span>총평 받기</span></div>
  </div>

  <div class="tray">
    <div class="compartment" id="loadingState">
      <div class="spinner"></div>
      <p>AI가 오늘 급식을 분석하는 중이에요...</p>
    </div>

    <div class="compartment" id="errorState">
      <p id="errorMessage">분석 중 문제가 발생했어요.</p>
      <button onclick="runAnalysis()">다시 시도</button>
    </div>

    <div class="compartment" id="resultState">
      <p class="menu-recap">오늘의 급식: <strong id="menuRecap"></strong></p>
      <div class="rating" id="ratingBox">
        <span id="starDisplay"></span>
        <span class="rating-num" id="ratingNum"></span>
      </div>
    </div>

    <div class="compartment" id="nutrients" style="display:none;">
      <p class="section-title">부족한 영양소</p>
      <ul class="nutrient-list" id="nutrientList"></ul>
    </div>

    <div class="compartment" id="summary" style="display:none;">
      <p class="section-title">총평</p>
      <p id="summaryText"></p>
    </div>

    <div class="compartment" id="dietNote" style="display:none;">
      <p class="section-title diet-title">다이어트 관점</p>
      <p id="dietText"></p>
    </div>

    <div class="compartment" id="muscleNote" style="display:none;">
      <p class="section-title muscle-title">근육량 증가 관점</p>
      <p id="muscleText"></p>
    </div>

    <div class="soup" id="tipBox" style="display:none;">
      <div class="rim"></div>
      <span>부족한 영양소는 다음 끼니에 챙겨보세요.</span>
    </div>

    <button class="retry" id="restartBtn" style="display:none;" onclick="location.href='d.html'">
      다른 급식 입력하기
    </button>
  </div>
</div>

<script>
  const GEMINI_API_KEY = "AQ.Ab8RN6IZ9MN1e9zT5iCKCWtiKLTAgZLEwkArbtBixHm_lxeQkQ";

  const menu = sessionStorage.getItem('mealMenu');

  const loadingState = document.getElementById('loadingState');
  const errorState = document.getElementById('errorState');
  const errorMessage = document.getElementById('errorMessage');
  const resultState = document.getElementById('resultState');
  const nutrientsBox = document.getElementById('nutrients');
  const summaryBox = document.getElementById('summary');
  const dietBox = document.getElementById('dietNote');
  const muscleBox = document.getElementById('muscleNote');
  const tipBox = document.getElementById('tipBox');
  const restartBtn = document.getElementById('restartBtn');
  const menuRecap = document.getElementById('menuRecap');
  const nutrientList = document.getElementById('nutrientList');
  const summaryText = document.getElementById('summaryText');
  const dietText = document.getElementById('dietText');
  const muscleText = document.getElementById('muscleText');
  const starDisplay = document.getElementById('starDisplay');
  const ratingNum = document.getElementById('ratingNum');

  function showLoading() {
    loadingState.style.display = 'block';
    errorState.style.display = 'none';
    resultState.style.display = 'none';
    nutrientsBox.style.display = 'none';
    summaryBox.style.display = 'none';
    dietBox.style.display = 'none';
    muscleBox.style.display = 'none';
    tipBox.style.display = 'none';
    restartBtn.style.display = 'none';
  }

  function showError(message) {
    loadingState.style.display = 'none';
    errorState.style.display = 'block';
    errorMessage.textContent = message;
  }

  function showResult(data) {
    loadingState.style.display = 'none';
    resultState.style.display = 'block';
    nutrientsBox.style.display = 'block';
    summaryBox.style.display = 'block';
    dietBox.style.display = 'block';
    muscleBox.style.display = 'block';
    tipBox.style.display = 'flex';
    restartBtn.style.display = 'flex';

    menuRecap.textContent = menu;

    const rating = Math.max(1, Math.min(5, Math.round(data.rating || 0)));
    starDisplay.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.textContent = '★';
      if (i <= rating) star.classList.add('filled');
      starDisplay.appendChild(star);
    }
    ratingNum.textContent = `${rating} / 5`;

    nutrientList.innerHTML = '';
    data.missingNutrients.forEach(n => {
      const li = document.createElement('li');
      li.textContent = n;
      nutrientList.appendChild(li);
    });
    summaryText.textContent = data.summary;
    dietText.textContent = data.dietComment;
    muscleText.textContent = data.muscleComment;
  }

  async function runAnalysis() {
    if (!menu) {
      showError('입력된 급식 메뉴가 없어요. 메뉴 입력 페이지로 돌아가주세요.');
      return;
    }
    showLoading();

    try {
      const prompt =
        `다음은 오늘의 급식 메뉴야: ${menu}\n\n` +
        `이 메뉴를 영양학적으로 분석해서, 아래 JSON 형식으로만 응답해줘. ` +
        `다른 설명이나 코드블록 없이 순수 JSON만 출력해:\n` +
        `{` +
          `"missingNutrients": ["부족한 영양소1", "부족한 영양소2"], ` +
          `"rating": 1부터 5까지의 정수 (전체적인 영양 균형 점수), ` +
          `"summary": "두세 문장의 총평", ` +
          `"dietComment": "이 식단이 다이어트(체중 감량)에 도움이 되는지 한두 문장으로 평가", ` +
          `"muscleComment": "이 식단이 근육량 증가에 도움이 되는지 한두 문장으로 평가"` +
        `}`;

      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-goog-api-key": GEMINI_API_KEY
          },
          body: JSON.stringify({
            contents: [
              { parts: [{ text: prompt }] }
            ],
            generationConfig: {
              maxOutputTokens: 500,
              thinkingConfig: { thinkingBudget: 0 }
            }
          })
        }
      );

      if (!response.ok) {
        throw new Error(`API 오류 (상태 코드: ${response.status})`);
      }

      const data = await response.json();
      const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!rawText) throw new Error('AI 응답을 받지 못했어요.');

      const cleaned = rawText.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);

      showResult(parsed);
    } catch (err) {
      showError('분석 중 문제가 발생했어요: ' + err.message);
    }
  }

  runAnalysis();
</script>
</body>
</html>
